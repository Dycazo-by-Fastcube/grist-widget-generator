name: Générer Widget Grist

on:
  issues:
    types: [opened]

jobs:
  generate-widget:
    # Uniquement pour les issues avec le label widget-generation
    if: contains(github.event.issue.labels.*.name, 'widget-generation')
    runs-on: ubuntu-latest

    permissions:
      contents: write
      issues: write
      actions: write
    
    steps:
      # 1. Checkout du repo public
      - name: Checkout repo public
        uses: actions/checkout@v4
      
      # 2. Checkout du repo privé avec les skills
      - name: Checkout skills privés
        uses: actions/checkout@v4
        with:
          repository: Dycazo-by-Fastcube/fastc-internal-tools  # ← CHANGE TON_USERNAME
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: skills-repo
      
      # 3. Parser l'issue pour extraire les données
      - name: Parser issue
        id: parse
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          echo "nom_module=$ISSUE_TITLE" >> $GITHUB_OUTPUT

          # Extraire la description (tout ce qui suit "Description :" jusqu'à la ligne vide)
          DESC=$(echo "$ISSUE_BODY" | sed -n '/Description :/,/^$/p' | sed '1d;$d' | tr -d '\n' | xargs)
          echo "description=${DESC:-Application de gestion}" >> $GITHUB_OUTPUT

          # Extraire le type (tout ce qui suit "Type :" jusqu'à la ligne vide)
          TYPE=$(echo "$ISSUE_BODY" | sed -n '/Type :/,/^$/p' | sed '1d;$d' | tr -d '\n' | xargs)
          echo "type_app=${TYPE:-liste}" >> $GITHUB_OUTPUT

          echo "Parsed - Nom: $ISSUE_TITLE"
          echo "Parsed - Description: $DESC"
          echo "Parsed - Type: $TYPE"
      
      # 4. Déboguer le chemin des skills
      - name: Déboguer skills
        run: |
          echo "=== Contenu de skills-repo/ ==="
          ls -la skills-repo/ || echo "skills-repo/ introuvable"
          echo "=== Sous-dossiers ==="
          find skills-repo/ -type d | head -20 || echo "Aucun dossier trouvé"
          echo "=== Fichiers .md ==="
          find skills-repo/ -name "*.md" | head -20 || echo "Aucun .md trouvé"

      # 5. Installer dépendances Python
      - name: Installer dépendances
        run: pip install anthropic

      # 6. Générer le .grist
      - name: Générer widget
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          printf '%s' "$ISSUE_BODY" > /tmp/spec_body.txt
          python3 generate.py \
            "$ISSUE_TITLE" \
            "/tmp/spec_body.txt" \
            "custom" \
            "Document_sans_titre.grist" \
            "skills-repo/01-skills-universels"
      
      # 5. Upload en artifact
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: widget-grist
          path: "*.grist"
          retention-days: 7
      
      # 6. Commenter l'issue avec le lien
      - name: Commenter issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const files = fs.readdirSync('.').filter(f => f.endsWith('.grist'));
            const filename = files[0];
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `Votre widget est pret !\n\nFichier: ${filename}\n\nAllez dans Actions > Summary > Artifacts pour telecharger`
            });
