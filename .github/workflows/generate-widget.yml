name: Générer Widget Grist

on:
  issues:
    types: [opened]

jobs:
  generate-widget:
    if: contains(github.event.issue.labels.*.name, 'widget-generation')
    runs-on: ubuntu-latest

    permissions:
      contents: write
      issues: write

    steps:
      # 1. Checkout du repo public
      - name: Checkout repo public
        uses: actions/checkout@v4

      # 2. Checkout du repo privé avec les skills
      - name: Checkout skills privés
        uses: actions/checkout@v4
        with:
          repository: Dycazo-by-Fastcube/fastc-internal-tools
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: skills-repo

      # 3. Installer dépendances Python
      - name: Installer dépendances
        run: pip install anthropic

      # 4. Calculer le slug et l'URL GitHub Pages du widget
      - name: Calculer slug widget
        id: slug
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          SLUG=$(echo "$ISSUE_TITLE" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/_/g' | cut -c1-40)
          WIDGET_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/widgets/${SLUG}/"
          echo "slug=$SLUG" >> $GITHUB_OUTPUT
          echo "widget_url=$WIDGET_URL" >> $GITHUB_OUTPUT
          echo "Widget URL : $WIDGET_URL"

      # 5. Générer le .grist + widget.html
      - name: Générer widget
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          ls *.grist 2>/dev/null | sort > /tmp/grist_before.txt
          printf '%s' "$ISSUE_BODY" > /tmp/spec_body.txt
          python3 generate.py \
            "$ISSUE_TITLE" \
            "/tmp/spec_body.txt" \
            "custom" \
            "default.grist" \
            "skills-repo/01-skills-universels" \
            "${{ steps.slug.outputs.widget_url }}"
          GENERATED=$(comm -13 /tmp/grist_before.txt <(ls *.grist 2>/dev/null | sort) | head -1)
          if [ -n "$GENERATED" ]; then
            echo "generated_grist=$GENERATED" >> $GITHUB_ENV
            echo "✅ Fichier généré : $GENERATED"
          else
            echo "⚠️  Aucun nouveau .grist trouvé"
          fi

      # 6. Publier widget.html + widget.grist dans le repo (GitHub Pages)
      - name: Publier widget HTML
        run: |
          SLUG="${{ steps.slug.outputs.slug }}"
          mkdir -p "widgets/$SLUG"
          STAGED=0
          if [ -f widget.html ]; then
            cp widget.html "widgets/$SLUG/index.html"
            STAGED=1
          else
            echo "⚠️  widget.html absent"
          fi
          if [ -n "$generated_grist" ] && [ -f "$generated_grist" ]; then
            cp "$generated_grist" "widgets/$SLUG/widget.grist"
            STAGED=1
            echo "✅ .grist copié : $generated_grist"
          else
            echo "⚠️  .grist absent ou non identifié"
          fi
          printf '{"issue_number":%s}' "${{ github.event.issue.number }}" > "widgets/$SLUG/info.json"
          STAGED=1
          if [ "$STAGED" = "1" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add "widgets/$SLUG/"
            git commit -m "widget: ${{ github.event.issue.title }}"
            git push
            echo "✅ Widget publié sur GitHub Pages"
          else
            echo "⚠️  Aucun fichier à publier (ANTHROPIC_API_KEY non configuré ?)"
          fi

      # 7. Upload artifact .grist
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: widget-grist
          path: "*.grist"
          retention-days: 7

      # 8. Commenter l'issue
      - name: Commenter issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const files = fs.readdirSync('.').filter(f => f.endsWith('.grist'));
            const filename = files[0] || 'widget.grist';
            const widgetUrl = '${{ steps.slug.outputs.widget_url }}';

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `✅ Widget généré !\n\n**Fichier .grist** : téléchargeable dans [Actions > Artifacts](https://github.com/${context.repo.owner}/${context.repo.repo}/actions)\n\n**Widget URL** : ${widgetUrl}\n\n> Assurez-vous que GitHub Pages est activé sur ce repo (Settings → Pages → Branch: main)`
            });
