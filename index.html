<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Générateur Widget Grist</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }
        input, textarea, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            margin-bottom: 20px;
            font-family: inherit;
            transition: border-color 0.3s;
        }
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        textarea {
            resize: vertical;
            min-height: 100px;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
        }
        button:active {
            transform: translateY(0);
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .status {
            margin-top: 20px;
            padding: 12px;
            border-radius: 6px;
            display: none;
        }
        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .status.loading {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        .required {
            color: #e74c3c;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎨 Générateur Widget Grist</h1>
        <p class="subtitle">Créez votre application Grist personnalisée en quelques clics</p>
        
        <form id="widgetForm">
            <label for="nom_module">
                Nom du module <span class="required">*</span>
            </label>
            <input 
                type="text" 
                id="nom_module" 
                name="nom_module" 
                placeholder="Ex: Gestion de tâches"
                required
            >
            
            <label for="description">
                Description <span class="required">*</span>
            </label>
            <textarea 
                id="description" 
                name="description" 
                placeholder="Décrivez brièvement votre besoin..."
                required
            ></textarea>
            
            <label for="type_app">
                Type d'interface
            </label>
            <select id="type_app" name="type_app">
                <option value="liste">Liste</option>
                <option value="kanban">Kanban</option>
                <option value="formulaire">Formulaire</option>
                <option value="tableau_bord">Tableau de bord</option>
            </select>
            
            <button type="submit" id="submitBtn">
                ✨ Générer mon widget
            </button>
        </form>
        
        <div id="status" class="status"></div>
    </div>

    <script>
        const form = document.getElementById('widgetForm');
        const submitBtn = document.getElementById('submitBtn');
        const statusDiv = document.getElementById('status');
        
        // ⚠️ REMPLACER CES VALEURS
        const GITHUB_OWNER = 'Dycazo-by-Fastcube';  // ← Change ici
        const GITHUB_REPO = 'grist-widget-generator';
        const GITHUB_TOKEN = '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';  // ← PAT avec scope public_repo
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = new FormData(form);
            const data = Object.fromEntries(formData);
            
            submitBtn.disabled = true;
            showStatus('loading', '⏳ Création de la demande...');
            
            try {
                // Créer une Issue GitHub
                const response = await fetch(
                    `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/issues`,
                    {
                        method: 'POST',
                        headers: {
                            'Authorization': `token ${GITHUB_TOKEN}`,
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            title: data.nom_module,
                            body: `**Description :** ${data.description}\n\n**Type :** ${data.type_app}\n\n---\n_Généré automatiquement_`,
                            labels: ['widget-generation']
                        })
                    }
                );
                
                if (!response.ok) throw new Error('Erreur API GitHub');
                
                const issue = await response.json();
                
                showStatus('success', 
                    `✅ Demande créée ! Votre widget sera prêt dans ~30 secondes.\n\n` +
                    `📋 Suivez l'avancement : <a href="${issue.html_url}" target="_blank">Issue #${issue.number}</a>`
                );
                
                form.reset();
                
            } catch (error) {
                showStatus('error', `❌ Erreur : ${error.message}`);
            } finally {
                submitBtn.disabled = false;
            }
        });
        
        function showStatus(type, message) {
            statusDiv.className = `status ${type}`;
            statusDiv.innerHTML = message;
            statusDiv.style.display = 'block';
        }
    </script>
</body>
</html>
