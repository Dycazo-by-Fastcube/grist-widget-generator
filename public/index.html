<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Générateur Widget Grist</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }
        input, textarea, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            margin-bottom: 20px;
            font-family: inherit;
            transition: border-color 0.3s;
        }
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        textarea {
            resize: vertical;
            min-height: 100px;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
        }
        button:hover:not(:disabled) {
            transform: translateY(-2px);
        }
        button:active:not(:disabled) {
            transform: translateY(0);
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .status {
            margin-top: 20px;
            padding: 12px;
            border-radius: 6px;
            display: none;
            font-size: 14px;
        }
        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }
        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }
        .status.loading {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
            display: block;
        }
        .required {
            color: #e74c3c;
        }
        .status a {
            color: inherit;
            font-weight: 600;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎨 Générateur Widget Grist</h1>
        <p class="subtitle">Créez votre application Grist personnalisée en quelques clics</p>
        
        <form id="widgetForm">
            <label for="nom_module">
                Nom du module <span class="required">*</span>
            </label>
            <input 
                type="text" 
                id="nom_module" 
                name="nom_module" 
                placeholder="Ex: Gestion de tâches"
                required
            >
            
            <label for="description">
                Description <span class="required">*</span>
            </label>
            <textarea 
                id="description" 
                name="description" 
                placeholder="Décrivez brièvement votre besoin..."
                required
            ></textarea>
            
            <label for="type_app">
                Type d'interface
            </label>
            <select id="type_app" name="type_app">
                <option value="liste">Liste</option>
                <option value="kanban">Kanban</option>
                <option value="formulaire">Formulaire</option>
                <option value="tableau_bord">Tableau de bord</option>
            </select>
            
            <button type="submit" id="submitBtn">
                ✨ Générer mon widget
            </button>
        </form>
        
        <div id="status" class="status"></div>
    </div>

    <script>
        // ⚠️ CONFIGURATION - Remplacez par l'URL de votre fonction Vercel
        const EDGE_FUNCTION_URL = 'https://grist-widget-generator.vercel.app/api/create-issue';
        
        const form = document.getElementById('widgetForm');
        const submitBtn = document.getElementById('submitBtn');
        const statusDiv = document.getElementById('status');
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = new FormData(form);
            const data = {
                nom_module: formData.get('nom_module'),
                description: formData.get('description'),
                type_app: formData.get('type_app')
            };
            
            submitBtn.disabled = true;
            showStatus('loading', '⏳ Création de votre demande...');
            
            try {
                const response = await fetch(EDGE_FUNCTION_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (!response.ok) {
                    throw new Error(result.error || 'Erreur lors de la création');
                }
                
                showStatus('success', 
                    `✅ Demande créée avec succès !<br><br>` +
                    `📋 Votre widget est en cours de génération (~30 secondes)<br><br>` +
                    `🔗 <a href="${result.issue_url}" target="_blank">Suivre la progression (Issue #${result.issue_number})</a><br><br>` +
                    `📥 Une fois prêt, téléchargez-le depuis la section "Artifacts" de l'issue.`
                );
                
                form.reset();
                
            } catch (error) {
                showStatus('error', 
                    `❌ Erreur : ${error.message}<br><br>` +
                    `Veuillez réessayer ou contacter le support.`
                );
            } finally {
                submitBtn.disabled = false;
            }
        });
        
        function showStatus(type, message) {
            statusDiv.className = `status ${type}`;
            statusDiv.innerHTML = message;
        }
    </script>
</body>
</html>
