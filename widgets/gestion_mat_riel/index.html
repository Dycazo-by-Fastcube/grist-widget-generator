<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Gestion Matériel</title>
<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:system-ui,sans-serif;background:#f5f7fa;color:#1f2937}
#root{padding:16px;max-width:1200px;margin:0 auto}
h1{font-size:20px;margin:0 0 12px}
.tabs{display:flex;gap:4px;border-bottom:2px solid #e5e7eb;margin-bottom:16px}
.tab{padding:8px 16px;cursor:pointer;border:none;background:none;font-size:14px;color:#6b7280;border-bottom:2px solid transparent;margin-bottom:-2px}
.tab.active{color:#2563eb;border-bottom-color:#2563eb;font-weight:600}
.card{background:#fff;border-radius:8px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.06);margin-bottom:16px}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{padding:8px 10px;text-align:left;border-bottom:1px solid #e5e7eb}
th{background:#f9fafb;font-weight:600;color:#374151}
tr:hover td{background:#f9fafb}
button{padding:6px 12px;font-size:13px;border-radius:6px;border:1px solid #d1d5db;background:#fff;cursor:pointer}
button:hover{background:#f3f4f6}
button.primary{background:#2563eb;color:#fff;border-color:#2563eb}
button.primary:hover{background:#1d4ed8}
button.danger{color:#dc2626;border-color:#fca5a5}
button.danger:hover{background:#fef2f2}
.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
input,select,textarea{padding:6px 10px;font-size:13px;border:1px solid #d1d5db;border-radius:6px;font-family:inherit}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:8px;margin-bottom:8px}
.grid label{font-size:12px;color:#6b7280;display:block;margin-bottom:2px}
.grid input,.grid select{width:100%}
.toast{position:fixed;top:16px;right:16px;padding:10px 16px;border-radius:6px;color:#fff;z-index:1000;font-size:13px}
.toast.ok{background:#16a34a}
.toast.err{background:#dc2626}
.actions{display:flex;gap:4px}
.empty{text-align:center;padding:24px;color:#9ca3af;font-size:13px}
.badge{display:inline-block;padding:2px 8px;background:#eff6ff;color:#1d4ed8;border-radius:10px;font-size:11px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef}=React;

const toRows=(t)=>{const ids=t.id||[];return ids.map((id,i)=>{const r={id};Object.keys(t).forEach(k=>{if(k!=='id')r[k]=t[k][i]});return r})};

const TABLES=['Materiel','Categorie','Affectation','Maintenance','Localisation'];

function App(){
  const [tab,setTab]=useState('Materiel');
  const [data,setData]=useState({Materiel:[],Categorie:[],Affectation:[],Maintenance:[],Localisation:[]});
  const [toast,setToast]=useState(null);
  const tref=useRef();

  const showToast=(type,msg)=>{setToast({type,msg});if(tref.current)clearTimeout(tref.current);tref.current=setTimeout(()=>setToast(null),2500)};

  const load=async()=>{
    try{
      const o={};
      for(const t of TABLES){o[t]=toRows(await grist.docApi.fetchTable(t))}
      setData(o);
    }catch(e){showToast('err','Erreur chargement: '+e.message)}
  };

  useEffect(()=>{
    grist.ready({requiredAccess:'full'});
    grist.onRecords(()=>load());
    load();
  },[]);

  const add=async(table,fields)=>{
    try{
      await grist.docApi.applyUserActions([['AddRecord',table,null,fields]]);
      await load();showToast('ok','Ajouté');
    }catch(e){showToast('err',e.message)}
  };
  const upd=async(table,id,fields)=>{
    try{
      await grist.docApi.applyUserActions([['UpdateRecord',table,id,fields]]);
      await load();showToast('ok','Modifié');
    }catch(e){showToast('err',e.message)}
  };
  const del=async(table,id)=>{
    if(!confirm('Supprimer ?'))return;
    try{
      await grist.docApi.applyUserActions([['RemoveRecord',table,id]]);
      await load();showToast('ok','Supprimé');
    }catch(e){showToast('err',e.message)}
  };

  return (<div>
    <h1>🛠️ Gestion Matériel</h1>
    <div className="tabs">
      {TABLES.map(t=><button key={t} className={'tab'+(tab===t?' active':'')} onClick={()=>setTab(t)}>{t}</button>)}
    </div>
    {tab==='Materiel' && <MaterielView data={data} add={add} upd={upd} del={del}/>}
    {tab==='Categorie' && <SimpleView table="Categorie" rows={data.Categorie} fields={[{k:'nom',l:'Nom'},{k:'description',l:'Description'}]} add={add} upd={upd} del={del}/>}
    {tab==='Localisation' && <SimpleView table="Localisation" rows={data.Localisation} fields={[{k:'nom',l:'Nom'},{k:'adresse',l:'Adresse'}]} add={add} upd={upd} del={del}/>}
    {tab==='Affectation' && <AffectationView data={data} add={add} upd={upd} del={del}/>}
    {tab==='Maintenance' && <MaintenanceView data={data} add={add} upd={upd} del={del}/>}
    {toast && <div className={'toast '+toast.type}>{toast.msg}</div>}
  </div>);
}

function SimpleView({table,rows,fields,add,upd,del}){
  const [form,setForm]=useState({});
  const [edit,setEdit]=useState(null);
  const submit=async()=>{
    if(edit){await upd(table,edit,form);setEdit(null)}else{await add(table,form)}
    setForm({});
  };
  return (<div className="card">
    <div className="grid">
      {fields.map(f=>(<div key={f.k}><label>{f.l}</label><input value={form[f.k]||''} onChange={e=>setForm({...form,[f.k]:e.target.value})}/></div>))}
    </div>
    <div className="row">
      <button className="primary" onClick={submit}>{edit?'Modifier':'Ajouter'}</button>
      {edit && <button onClick={()=>{setEdit(null);setForm({})}}>Annuler</button>}
    </div>
    <table><thead><tr>{fields.map(f=><th key={f.k}>{f.l}</th>)}<th></th></tr></thead><tbody>
    {rows.length===0 && <tr><td colSpan={fields.length+1} className="empty">Aucune donnée</td></tr>}
    {rows.map(r=>(<tr key={r.id}>
      {fields.map(f=><td key={f.k}>{r[f.k]}</td>)}
      <td className="actions">
        <button onClick={()=>{setEdit(r.id);setForm(fields.reduce((a,f)=>({...a,[f.k]:r[f.k]||''}),{}))}}>✎</button>
        <button className="danger" onClick={()=>del(table,r.id)}>✕</button>
      </td>
    </tr>))}
    </tbody></table>
  </div>);
}

function MaterielView({data,add,upd,del}){
  const [form,setForm]=useState({});
  const [edit,setEdit]=useState(null);
  const cats=data.Categorie;const locs=data.Localisation;
  const submit=async()=>{
    const f={...form};
    if(f.categorie_id)f.categorie_id=parseInt(f.categorie_id);
    if(f.localisation_id)f.localisation_id=parseInt(f.localisation_id);
    if(edit){await upd('Materiel',edit,f);setEdit(null)}else{await add('Materiel',f)}
    setForm({});
  };
  const nameOf=(rows,id)=>rows.find(r=>r.id===id)?.nom||'';
  return (<div className="card">
    <div className="grid">
      <div><label>Nom</label><input value={form.nom||''} onChange={e=>setForm({...form,nom:e.target.value})}/></div>
      <div><label>N° série</label><input value={form.numero_serie||''} onChange={e=>setForm({...form,numero_serie:e.target.value})}/></div>
      <div><label>Catégorie</label><select value={form.categorie_id||''} onChange={e=>setForm({...form,categorie_id:e.target.value})}>
        <option value="">--</option>{cats.map(c=><option key={c.id} value={c.id}>{c.nom}</option>)}
      </select></div>
      <div><label>Localisation</label><select value={form.localisation_id||''} onChange={e=>setForm({...form,localisation_id:e.target.value})}>
        <option value="">--</option>{locs.map(l=><option key={l.id} value={l.id}>{l.nom}</option>)}
      </select></div>
      <div><label>Statut</label><select value={form.statut||''} onChange={e=>setForm({...form,statut:e.target.value})}>
        <option value="">--</option><option>Disponible</option><option>Affecté</option><option>Maintenance</option><option>HS</option>
      </select></div>
    </div>
    <div className="row">
      <button className="primary" onClick={submit}>{edit?'Modifier':'Ajouter'}</button>
      {edit && <button onClick={()=>{setEdit(null);setForm({})}}>Annuler</button>}
    </div>
    <table><thead><tr><th>Nom</th><th>N° série</th><th>Catégorie</th><th>Localisation</th><th>Statut</th><th></th></tr></thead><tbody>
    {data.Materiel.length===0 && <tr><td colSpan="6" className="empty">Aucun matériel</td></tr>}
    {data.Materiel.map(m=>(<tr key={m.id}>
      <td>{m.nom}</td><td>{m.numero_serie}</td>
      <td>{nameOf(cats,m.categorie_id)}</td>
      <td>{nameOf(locs,m.localisation_id)}</td>
      <td><span className="badge">{m.statut}</span></td>
      <td className="actions">
        <button onClick={()=>{setEdit(m.id);setForm({nom:m.nom||'',numero_serie:m.numero_serie||'',categorie_id:m.categorie_id||'',localisation_id:m.localisation_id||'',statut:m.statut||''})}}>✎</button>
        <button className="danger" onClick={()=>del('Materiel',m.id)}>✕</button>
      </td>
    </tr>))}
    </tbody></table>
  </div>);
}

function AffectationView({data,add,upd,del}){
  const [form,setForm]=useState({});
  const [edit,setEdit]=useState(null);
  const mats=data.Materiel;
  const submit=async()=>{
    const f={...form};
    if(f.materiel_id)f.materiel_id=parseInt(f.materiel_id);
    if(edit){await upd('Affectation',edit,f);setEdit(null)}else{await add('Affectation',f)}
    setForm({});
  };
  const nameOf=(id)=>mats.find(r=>r.id===id)?.nom||'';
  return (<div className="card">
    <div className="grid">
      <div><label>Matériel</label><select value={form.materiel_id||''} onChange={e=>setForm({...form,materiel_id:e.target.value})}>
        <option value="">--</option>{mats.map(m=><option key={m.id} value={m.id}>{m.nom}</option>)}
      </select></div>
      <div><label>Utilisateur</label><input value={form.utilisateur||''} onChange={e=>setForm({...form,utilisateur:e.target.value})}/></div>
      <div><label>Date début</label><input type="date" value={form.date_debut||''} onChange={e=>setForm({...form,date_debut:e.target.value})}/></div>
      <div><label>Date fin</label><input type="date" value={form.date_fin||''} onChange={e=>setForm({...form,date_fin:e.target.value})}/></div>
    </div>
    <div className="row">
      <button className="primary" onClick={submit}>{edit?'Modifier':'Ajouter'}</button>
      {edit && <button onClick={()=>{setEdit(null);setForm({})}}>Annuler</button>}
    </div>
    <table><thead><tr><th>Matériel</th><th>Utilisateur</th><th>Début</th><th>Fin</th><th></th></tr></thead><tbody>
    {data.Affectation.length===0 && <tr><td colSpan="5" className="empty">Aucune affectation</td></tr>}
    {data.Affectation.map(a=>(<tr key={a.id}>
      <td>{nameOf(a.materiel_id)}</td><td>{a.utilisateur}</td><td>{a.date_debut}</td><td>{a.date_fin}</td>
      <td className="actions">
        <button onClick={()=>{setEdit(a.id);setForm({materiel_id:a.materiel_id||'',utilisateur:a.utilisateur||'',date_debut:a.date_debut||'',date_fin:a.date_fin||''})}}>✎</button>
        <button className="danger" onClick={()=>del('Affectation',a.id)}>✕</button>
      </td>
    </tr>))}
    </tbody></table>
  </div>);
}

function MaintenanceView({data,add,upd,del}){
  const [form,setForm]=useState({});
  const [edit,setEdit]=useState(null);
  const mats=data.Materiel;
  const submit=async()=>{
    const f={...form};
    if(f.materiel_id)f.materiel_id=parseInt(f.materiel_id);
    if(f.cout)f.cout=parseFloat(f.cout);
    if(edit){await upd('Maintenance',edit,f);setEdit(null)}else{await add('Maintenance',f)}
    setForm({});
  };
  const nameOf=(id)=>mats.find(r=>r.id===id)?.nom||'';
  return (<div className="card">
    <div className="grid">
      <div><label>Matériel</label><select value={form.materiel_id||''} onChange={e=>setForm({...form,materiel_id:e.target.value})}>
        <option value="">--</option>{mats.map(m=><option key={m.id} value={m.id}>{m.nom}</option>)}
      </select></div>
      <div><label>Date</label><input type="date" value={form.date||''} onChange={e=>setForm({...form,date:e.target.value})}/></div>
      <div><label>Type</label><select value={form.type||''} onChange={e=>setForm({...form,type:e.target.value})}>
        <option value="">--</option><option>Préventive</option><option>Curative</option><option>Contrôle</option>
      </select></div>
      <div><label>Coût</label><input type="number" step="0.01" value={form.cout||''} onChange={e=>setForm({...form,cout:e.target.value})}/></div>
      <div style={{gridColumn:'1/-1'}}><label>Description</label><input value={form.description||''} onChange={e=>setForm({...form,description:e.target.value})}/></div>
    </div>
    <div className="row">
      <button className="primary" onClick={submit}>{edit?'Modifier':'Ajouter'}</button>
      {edit && <button onClick={()=>{setEdit(null);setForm({})}}>Annuler</button>}
    </div>
    <table><thead><tr><th>Matériel</th><th>Date</th><th>Type</th><th>Coût</th><th>Description</th><th></th></tr></thead><tbody>
    {data.Maintenance.length===0 && <tr><td colSpan="6" className="empty">Aucune maintenance</td></tr>}
    {data.Maintenance.map(m=>(<tr key={m.id}>
      <td>{nameOf(m.materiel_id)}</td><td>{m.date}</td><td>{m.type}</td><td>{m.cout}</td><td>{m.description}</td>
      <td className="actions">
        <button onClick={()=>{setEdit(m.id);setForm({materiel_id:m.materiel_id||'',date:m.date||'',type:m.type||'',cout:m.cout||'',description:m.description||''})}}>✎</button>
        <button className="danger" onClick={()=>del('Maintenance',m.id)}>✕</button>
      </td>
    </tr>))}
    </tbody></table>
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
