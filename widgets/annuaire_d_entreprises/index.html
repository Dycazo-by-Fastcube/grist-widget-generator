<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Annuaire Entreprises</title>
<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box}
body{font-family:system-ui,sans-serif;margin:0;padding:16px;background:#f5f7fa;color:#222}
h1{font-size:20px;margin:0 0 12px}
.bar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
input,select,button,textarea{padding:8px;border:1px solid #ccc;border-radius:6px;font-size:14px;font-family:inherit}
button{background:#2563eb;color:#fff;border:none;cursor:pointer}
button:hover{background:#1d4ed8}
button.sec{background:#e5e7eb;color:#222}
button.danger{background:#dc2626}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.08)}
th,td{padding:10px;text-align:left;border-bottom:1px solid #eee;font-size:14px}
th{background:#f1f5f9;font-weight:600}
tr:hover{background:#f9fafb;cursor:pointer}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:99}
.modal-box{background:#fff;padding:20px;border-radius:10px;width:90%;max-width:560px;max-height:90vh;overflow:auto}
.row{display:grid;grid-template-columns:140px 1fr;gap:8px;margin-bottom:10px;align-items:center}
.actions{display:flex;gap:6px;justify-content:flex-end;margin-top:12px}
.toast{position:fixed;top:16px;right:16px;padding:10px 16px;border-radius:6px;color:#fff;z-index:100}
.toast.ok{background:#059669}.toast.err{background:#dc2626}
.tab{display:flex;gap:4px;margin-bottom:12px;border-bottom:2px solid #e5e7eb}
.tab button{background:none;color:#555;border-radius:0;border-bottom:2px solid transparent;margin-bottom:-2px}
.tab button.active{color:#2563eb;border-bottom-color:#2563eb}
.sub{background:#f9fafb;padding:12px;border-radius:8px;margin-top:12px}
.sub h3{margin:0 0 8px;font-size:15px}
.chip{display:inline-block;background:#dbeafe;color:#1e40af;padding:2px 8px;border-radius:12px;font-size:12px;margin-right:4px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef}=React;
const toRows=t=>{const ids=t.id||[];return ids.map((id,i)=>{const r={id};Object.keys(t).forEach(k=>{if(k!=='id')r[k]=t[k][i]});return r})};

function App(){
  const [ents,setEnts]=useState([]);
  const [contacts,setContacts]=useState([]);
  const [secteurs,setSecteurs]=useState([]);
  const [adresses,setAdresses]=useState([]);
  const [q,setQ]=useState('');
  const [fSect,setFSect]=useState('');
  const [sel,setSel]=useState(null);
  const [edit,setEdit]=useState(null);
  const [toast,setToast]=useState(null);
  const tRef=useRef();

  const notify=(type,msg)=>{setToast({type,msg});clearTimeout(tRef.current);tRef.current=setTimeout(()=>setToast(null),2500)};

  const load=async()=>{
    try{
      const [e,c,s,a]=await Promise.all([
        grist.docApi.fetchTable('Entreprise'),
        grist.docApi.fetchTable('Contact'),
        grist.docApi.fetchTable('Secteur'),
        grist.docApi.fetchTable('Adresse')
      ]);
      setEnts(toRows(e));setContacts(toRows(c));setSecteurs(toRows(s));setAdresses(toRows(a));
    }catch(err){notify('err','Erreur chargement: '+err.message)}
  };

  useEffect(()=>{grist.ready({requiredAccess:'full'});load()},[]);

  const secName=id=>secteurs.find(x=>x.id===id)?.nom||secteurs.find(x=>x.id===id)?.libelle||'-';
  const adrLabel=a=>a?[a.rue,a.code_postal,a.ville].filter(Boolean).join(', '):'';

  const filtered=ents.filter(e=>{
    const s=(e.nom||e.raison_sociale||'').toLowerCase();
    if(q&&!s.includes(q.toLowerCase()))return false;
    if(fSect&&String(e.secteur||e.secteur_id)!==fSect)return false;
    return true;
  });

  const save=async(data)=>{
    try{
      const {id,...f}=data;
      if(id){await grist.docApi.applyUserActions([['UpdateRecord','Entreprise',id,f]]);notify('ok','Modifiée')}
      else{await grist.docApi.applyUserActions([['AddRecord','Entreprise',null,f]]);notify('ok','Créée')}
      setEdit(null);await load();
    }catch(err){notify('err',err.message)}
  };

  const del=async(id)=>{
    if(!confirm('Supprimer cette entreprise ?'))return;
    try{await grist.docApi.applyUserActions([['RemoveRecord','Entreprise',id]]);notify('ok','Supprimée');setSel(null);await load()}
    catch(err){notify('err',err.message)}
  };

  return(<div>
    <h1>📇 Annuaire des entreprises</h1>
    <div className="bar">
      <input placeholder="Rechercher..." value={q} onChange={e=>setQ(e.target.value)} style={{flex:1,minWidth:200}}/>
      <select value={fSect} onChange={e=>setFSect(e.target.value)}>
        <option value="">Tous secteurs</option>
        {secteurs.map(s=><option key={s.id} value={s.id}>{s.nom||s.libelle||'#'+s.id}</option>)}
      </select>
      <button onClick={()=>setEdit({})}>+ Nouvelle entreprise</button>
      <button className="sec" onClick={load}>↻</button>
    </div>
    <table>
      <thead><tr><th>Nom</th><th>Secteur</th><th>Email</th><th>Téléphone</th><th>Site</th><th></th></tr></thead>
      <tbody>
        {filtered.length===0&&<tr><td colSpan="6" style={{textAlign:'center',padding:20,color:'#888'}}>Aucune entreprise</td></tr>}
        {filtered.map(e=>(
          <tr key={e.id} onClick={()=>setSel(e)}>
            <td><b>{e.nom||e.raison_sociale||'#'+e.id}</b></td>
            <td>{secName(e.secteur||e.secteur_id)}</td>
            <td>{e.email||''}</td>
            <td>{e.telephone||e.tel||''}</td>
            <td>{e.site_web||e.site||''}</td>
            <td onClick={ev=>ev.stopPropagation()}>
              <button className="sec" onClick={()=>setEdit(e)}>✎</button>{' '}
              <button className="danger" onClick={()=>del(e.id)}>✕</button>
            </td>
          </tr>
        ))}
      </tbody>
    </table>

    {sel&&<DetailModal ent={sel} contacts={contacts.filter(c=>(c.entreprise||c.entreprise_id)===sel.id)} adresses={adresses.filter(a=>(a.entreprise||a.entreprise_id)===sel.id)} secteurs={secteurs} onClose={()=>setSel(null)} onEdit={()=>{setEdit(sel);setSel(null)}} onReload={load} notify={notify} adrLabel={adrLabel}/>}
    {edit&&<EditModal ent={edit} secteurs={secteurs} onClose={()=>setEdit(null)} onSave={save}/>}
    {toast&&<div className={'toast '+toast.type}>{toast.msg}</div>}
  </div>);
}

function EditModal({ent,secteurs,onClose,onSave}){
  const [f,setF]=useState({
    id:ent.id,
    nom:ent.nom||ent.raison_sociale||'',
    secteur:ent.secteur||ent.secteur_id||0,
    email:ent.email||'',
    telephone:ent.telephone||ent.tel||'',
    site_web:ent.site_web||ent.site||'',
    description:ent.description||''
  });
  const upd=(k,v)=>setF({...f,[k]:v});
  return(<div className="modal" onClick={onClose}><div className="modal-box" onClick={e=>e.stopPropagation()}>
    <h2 style={{marginTop:0}}>{f.id?'Modifier':'Nouvelle'} entreprise</h2>
    <div className="row"><label>Nom *</label><input value={f.nom} onChange={e=>upd('nom',e.target.value)}/></div>
    <div className="row"><label>Secteur</label>
      <select value={f.secteur} onChange={e=>upd('secteur',Number(e.target.value))}>
        <option value="0">—</option>
        {secteurs.map(s=><option key={s.id} value={s.id}>{s.nom||s.libelle||'#'+s.id}</option>)}
      </select>
    </div>
    <div className="row"><label>Email</label><input value={f.email} onChange={e=>upd('email',e.target.value)}/></div>
    <div className="row"><label>Téléphone</label><input value={f.telephone} onChange={e=>upd('telephone',e.target.value)}/></div>
    <div className="row"><label>Site web</label><input value={f.site_web} onChange={e=>upd('site_web',e.target.value)}/></div>
    <div className="row"><label>Description</label><textarea rows="3" value={f.description} onChange={e=>upd('description',e.target.value)}/></div>
    <div className="actions">
      <button className="sec" onClick={onClose}>Annuler</button>
      <button onClick={()=>f.nom.trim()?onSave(f):alert('Nom requis')}>Enregistrer</button>
    </div>
  </div></div>);
}

function DetailModal({ent,contacts,adresses,secteurs,onClose,onEdit,onReload,notify,adrLabel}){
  const [tab,setTab]=useState('info');
  const [subEdit,setSubEdit]=useState(null);
  const secName=secteurs.find(s=>s.id===(ent.secteur||ent.secteur_id))?.nom||secteurs.find(s=>s.id===(ent.secteur||ent.secteur_id))?.libelle||'-';

  const saveSub=async(table,data)=>{
    try{
      const {id,...f}=data;
      f.entreprise=ent.id;````html
      if(id)await grist.docApi.applyUserActions([['UpdateRecord',table,id,f]]);
      else await grist.docApi.applyUserActions([['AddRecord',table,null,f]]);
      notify('ok','Enregistré');setSubEdit(null);onReload();
    }catch(err){notify('err',err.message)}
  };
  const delSub=async(table,id)=>{
    if(!confirm('Supprimer ?'))return;
    try{await grist.docApi.applyUserActions([['RemoveRecord',table,id]]);notify('ok','Supprimé');onReload()}
    catch(err){notify('err',err.message)}
  };

  return(<div className="modal" onClick={onClose}><div className="modal-box" onClick={e=>e.stopPropagation()} style={{maxWidth:700}}>
    <h2 style={{marginTop:0}}>{ent.nom||ent.raison_sociale||'#'+ent.id}</h2>
    <div className="tab">
      <button className={tab==='info'?'active':''} onClick={()=>setTab('info')}>Infos</button>
      <button className={tab==='contacts'?'active':''} onClick={()=>setTab('contacts')}>Contacts ({contacts.length})</button>
      <button className={tab==='adresses'?'active':''} onClick={()=>setTab('adresses')}>Adresses ({adresses.length})</button>
    </div>

    {tab==='info'&&<div>
      <div className="row"><label>Secteur</label><span><span className="chip">{secName}</span></span></div>
      <div className="row"><label>Email</label><span>{ent.email||'-'}</span></div>
      <div className="row"><label>Téléphone</label><span>{ent.telephone||ent.tel||'-'}</span></div>
      <div className="row"><label>Site</label><span>{ent.site_web||ent.site||'-'}</span></div>
      <div className="row"><label>Description</label><span>{ent.description||'-'}</span></div>
    </div>}

    {tab==='contacts'&&<div>
      <button onClick={()=>setSubEdit({_table:'Contact'})}>+ Ajouter contact</button>
      <div className="sub">
        {contacts.length===0&&<div style={{color:'#888'}}>Aucun contact</div>}
        {contacts.map(c=>(
          <div key={c.id} style={{display:'flex',justifyContent:'space-between',padding:'6px 0',borderBottom:'1px solid #eee'}}>
            <div>
              <b>{c.prenom||''} {c.nom||''}</b>
              {c.fonction&&<span style={{color:'#666'}}> — {c.fonction}</span>}
              <div style={{fontSize:13,color:'#555'}}>{c.email||''} {c.telephone||c.tel||''}</div>
            </div>
            <div>
              <button className="sec" onClick={()=>setSubEdit({...c,_table:'Contact'})}>✎</button>{' '}
              <button className="danger" onClick={()=>delSub('Contact',c.id)}>✕</button>
            </div>
          </div>
        ))}
      </div>
    </div>}

    {tab==='adresses'&&<div>
      <button onClick={()=>setSubEdit({_table:'Adresse'})}>+ Ajouter adresse</button>
      <div className="sub">
        {adresses.length===0&&<div style={{color:'#888'}}>Aucune adresse</div>}
        {adresses.map(a=>(
          <div key={a.id} style={{display:'flex',justifyContent:'space-between',padding:'6px 0',borderBottom:'1px solid #eee'}}>
            <div>
              <b>{a.type||a.libelle||'Adresse'}</b>
              <div style={{fontSize:13,color:'#555'}}>{adrLabel(a)||'-'}{a.pays?' ('+a.pays+')':''}</div>
            </div>
            <div>
              <button className="sec" onClick={()=>setSubEdit({...a,_table:'Adresse'})}>✎</button>{' '}
              <button className="danger" onClick={()=>delSub('Adresse',a.id)}>✕</button>
            </div>
          </div>
        ))}
      </div>
    </div>}

    <div className="actions">
      <button className="danger" onClick={()=>{if(confirm('Supprimer cette entreprise ?'))grist.docApi.applyUserActions([['RemoveRecord','Entreprise',ent.id]]).then(()=>{notify('ok','Supprimée');onClose();onReload()})}}>Supprimer</button>
      <button className="sec" onClick={onClose}>Fermer</button>
      <button onClick={onEdit}>Modifier</button>
    </div>

    {subEdit&&<SubEditModal data={subEdit} onClose={()=>setSubEdit(null)} onSave={d=>saveSub(subEdit._table,d)}/>}
  </div></div>);
}

function SubEditModal({data,onClose,onSave}){
  const isContact=data._table==='Contact';
  const [f,setF]=useState(isContact?{
    id:data.id,prenom:data.prenom||'',nom:data.nom||'',fonction:data.fonction||'',email:data.email||'',telephone:data.telephone||data.tel||''
  }:{
    id:data.id,type:data.type||data.libelle||'',rue:data.rue||'',code_postal:data.code_postal||'',ville:data.ville||'',pays:data.pays||''
  });
  const upd=(k,v)=>setF({...f,[k]:v});
  return(<div className="modal" onClick={onClose}><div className="modal-box" onClick={e=>e.stopPropagation()}>
    <h2 style={{marginTop:0}}>{f.id?'Modifier':'Nouveau'} {isContact?'contact':'adresse'}</h2>
    {isContact?<>
      <div className="row"><label>Prénom</label><input value={f.prenom} onChange={e=>upd('prenom',e.target.value)}/></div>
      <div className="row"><label>Nom *</label><input value={f.nom} onChange={e=>upd('nom',e.target.value)}/></div>
      <div className="row"><label>Fonction</label><input value={f.fonction} onChange={e=>upd('fonction',e.target.value)}/></div>
      <div className="row"><label>Email</label><input value={f.email} onChange={e=>upd('email',e.target.value)}/></div>
      <div className="row"><label>Téléphone</label><input value={f.telephone} onChange={e=>upd('telephone',e.target.value)}/></div>
    </>:<>
      <div className="row"><label>Type</label><input value={f.type} onChange={e=>upd('type',e.target.value)} placeholder="Siège, Facturation..."/></div>
      <div className="row"><label>Rue</label><input value={f.rue} onChange={e=>upd('rue',e.target.value)}/></div>
      <div className="row"><label>Code postal</label><input value={f.code_postal} onChange={e=>upd('code_postal',e.target.value)}/></div>
      <div className="row"><label>Ville</label><input value={f.ville} onChange={e=>upd('ville',e.target.value)}/></div>
      <div className="row"><label>Pays</label><input value={f.pays} onChange={e=>upd('pays',e.target.value)}/></div>
    </>}
    <div className="actions">
      <button className="sec" onClick={onClose}>Annuler</button>
      <button onClick={()=>{const {_table,...d}=f;onSave(d)}}>Enregistrer</button>
    </div>
  </div></div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
````
