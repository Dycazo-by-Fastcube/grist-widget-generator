<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Gestion des Tests</title>
<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box}
body{font-family:-apple-system,Segoe UI,Roboto,sans-serif;margin:0;padding:16px;background:#f5f6f8;color:#222}
h2{margin:0 0 12px;font-size:18px}
h3{margin:16px 0 8px;font-size:15px;color:#444}
.layout{display:grid;grid-template-columns:340px 1fr;gap:16px}
.card{background:#fff;border:1px solid #e3e5e8;border-radius:8px;padding:14px}
.list{max-height:70vh;overflow:auto}
.item{padding:10px;border:1px solid #e3e5e8;border-radius:6px;margin-bottom:6px;cursor:pointer;background:#fafbfc}
.item:hover{background:#eef3fa}
.item.sel{background:#e3efff;border-color:#4a90e2}
.item .t{font-weight:600;font-size:14px}
.item .d{font-size:12px;color:#666;margin-top:2px}
button{background:#4a90e2;color:#fff;border:0;padding:7px 12px;border-radius:5px;cursor:pointer;font-size:13px}
button:hover{background:#3a7fcf}
button.sec{background:#6c757d}
button.sec:hover{background:#5a6268}
button.dng{background:#dc3545}
button.dng:hover{background:#c82333}
input,textarea,select{width:100%;padding:7px;border:1px solid #ccc;border-radius:4px;font-size:13px;font-family:inherit}
textarea{resize:vertical;min-height:50px}
label{display:block;font-size:12px;color:#555;margin:8px 0 3px;font-weight:500}
.row{display:flex;gap:8px;align-items:center}
.row>*{flex:1}
.bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.empty{color:#888;font-style:italic;font-size:13px;padding:10px}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{text-align:left;padding:6px 8px;border-bottom:1px solid #eee}
th{background:#f5f6f8;font-weight:600}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.ok{background:#d4edda;color:#155724}
.ko{background:#f8d7da;color:#721c24}
.wait{background:#fff3cd;color:#856404}
.toast{position:fixed;top:16px;right:16px;padding:10px 16px;border-radius:5px;color:#fff;z-index:999;font-size:13px}
.toast.ok{background:#28a745}
.toast.err{background:#dc3545}
.actions{display:flex;gap:6px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef}=React;
const toRows=(t)=>{const ids=t.id||[];return ids.map((id,i)=>{const r={id};Object.keys(t).forEach(k=>{if(k!=='id')r[k]=t[k][i]});return r})};

function App(){
  const [tests,setTests]=useState([]);
  const [etapes,setEtapes]=useState([]);
  const [resultats,setResultats]=useState([]);
  const [selTest,setSelTest]=useState(null);
  const [toast,setToast]=useState(null);
  const [form,setForm]=useState({nom:'',description:''});
  const [etapeForm,setEtapeForm]=useState({libelle:'',ordre:''});
  const [resForm,setResForm]=useState({etape_id:'',statut:'ok',commentaire:''});
  const tm=useRef(null);

  const showT=(type,msg)=>{setToast({type,msg});if(tm.current)clearTimeout(tm.current);tm.current=setTimeout(()=>setToast(null),2500)};

  const load=async()=>{
    try{
      const t=toRows(await grist.docApi.fetchTable('Test'));
      const e=toRows(await grist.docApi.fetchTable('Etape'));
      const r=toRows(await grist.docApi.fetchTable('Resultat'));
      setTests(t);setEtapes(e);setResultats(r);
    }catch(err){showT('err','Erreur chargement: '+err.message)}
  };

  useEffect(()=>{
    grist.ready({requiredAccess:'full'});
    grist.onRecords(()=>load());
    load();
  },[]);

  const createTest=async()=>{
    if(!form.nom.trim())return showT('err','Nom requis');
    try{
      await grist.docApi.applyUserActions([['AddRecord','Test',null,{nom:form.nom,description:form.description}]]);
      setForm({nom:'',description:''});
      showT('ok','Test créé');
      await load();
    }catch(err){showT('err',err.message)}
  };

  const delTest=async(id)=>{
    if(!confirm('Supprimer ce test et ses étapes ?'))return;
    try{
      const es=etapes.filter(e=>e.test_id===id);
      const rs=resultats.filter(r=>es.some(e=>e.id===r.etape_id));
      const acts=[];
      rs.forEach(r=>acts.push(['RemoveRecord','Resultat',r.id]));
      es.forEach(e=>acts.push(['RemoveRecord','Etape',e.id]));
      acts.push(['RemoveRecord','Test',id]);
      await grist.docApi.applyUserActions(acts);
      if(selTest===id)setSelTest(null);
      showT('ok','Supprimé');
      await load();
    }catch(err){showT('err',err.message)}
  };

  const updTest=async(id,f,v)=>{
    try{await grist.docApi.applyUserActions([['UpdateRecord','Test',id,{[f]:v}]]);await load()}
    catch(err){showT('err',err.message)}
  };

  const addEtape=async()=>{
    if(!selTest)return;
    if(!etapeForm.libelle.trim())return showT('err','Libellé requis');
    try{
      const ord=etapeForm.ordre?parseInt(etapeForm.ordre):(etapes.filter(e=>e.test_id===selTest).length+1);
      await grist.docApi.applyUserActions([['AddRecord','Etape',null,{test_id:selTest,libelle:etapeForm.libelle,ordre:ord}]]);
      setEtapeForm({libelle:'',ordre:''});
      showT('ok','Étape ajoutée');
      await load();
    }catch(err){showT('err',err.message)}
  };

  const delEtape=async(id)=>{
    if(!confirm('Supprimer cette étape ?'))return;
    try{
      const rs=resultats.filter(r=>r.etape_id===id);
      const acts=rs.map(r=>['RemoveRecord','Resultat',r.id]);
      acts.push(['RemoveRecord','Etape',id]);
      await grist.docApi.applyUserActions(acts);
      await load();
      showT('ok','Supprimé');
    }catch(err){showT('err',err.message)}
  };

  const addRes=async()=>{
    if(!resForm.etape_id)return showT('err','Étape requise');
    try{
      await grist.docApi.applyUserActions([['AddRecord','Resultat',null,{etape_id:parseInt(resForm.etape_id),statut:resForm.statut,commentaire:resForm.commentaire,date:Date.now()/1000}]]);
      setResForm({etape_id:'',statut:'ok',commentaire:''});
      showT('ok','Résultat ajouté');
      await load();
    }catch(err){showT('err',err.message)}
  };

  const delRes=async(id)=>{
    try{await grist.docApi.applyUserActions([['RemoveRecord','Resultat',id]]);await load();showT('ok','Supprimé')}
    catch(err){showT('err',err.message)}
  };

  const test=tests.find(t=>t.id===selTest);
  const etapesT=etapes.filter(e=>e.test_id===selTest).sort((a,b)=>(a.ordre||0)-(b.ordre||0));

  return(<div>
    {toast&&<div className={'toast '+toast.type}>{toast.msg}</div>}
    <div className="layout">
      <div>
        <div className="card">
          <h2>Tests</h2>
          <label>Nom</label>
          <input value={form.nom} onChange={e=>setForm({...form,nom:e.target.value})} placeholder="Nom du test"/>
          <label>Description</label>
          <textarea value={form.description} onChange={e=>setForm({...form,description:e.target.value})}/>
          <div style={{marginTop:8}}><button onClick={createTest}>+ Créer</button></div>
        </div>
        <div className="card" style={{marginTop:12}}>
          <h3>Liste ({tests.length})</h3>
          <div className="list">
            {tests.length===0&&<div className="empty">Aucun test</div>}
            {tests.map(t=>(
              <div key={t.id} className={'item'+(selTest===t.id?' sel':'')} onClick={()=>setSelTest(t.id)}>
                <div className="t">{t.nom||'(sans nom)'}</div>
                {t.description&&<div className="d">{t.description}</div>}
                <div className="d">{etapes.filter(e=>e.test_id===t.id).length} étape(s)</div>
              </div>
            ))}
          </div>
        </div>
      </div>
      <div className="card">
        {!test?(<div className="empty">Sélectionnez un test à gauche</div>):(<div>
          <div className="bar">
            <h2>{test.nom}</h2>
            <button className="dng" onClick={()=>delTest(test.id)}>Supprimer le test</button>
          </div>
          <label>Nom</label>
          <input defaultValue={test.nom} onBlur={e=>e.target.value!==test.nom&&updTest(test.id,'nom',e.target.value)}/>
          <label>Description</label>
          <textarea defaultValue={test.description||''} onBlur={e=>e.target.value!==(test.description||'')&&updTest(test.id,'description',e.target.value)}/>

          <h3>Étapes</h3>
          <div className="row">
            <input placeholder="Libellé étape" value={etapeForm.libelle} onChange={e=>setEtapeForm({...etapeForm,libelle:e.target.value})}/>
            <input type="number" placeholder="Ordre" value={etapeForm.ordre} onChange={e=>setEtapeForm({...etapeForm,ordre:e.target.value})} style={{maxWidth:80}}/>
            <button onClick={addEtape} style={{flex:'0 0 auto'}}>+ Ajouter</button>
          </div>
          <table style={{marginTop:10}}>
            <thead><tr><th style={{width:50}}>#</th><th>Libellé</th><th style={{width:80}}>Résultats</th><th style={{width:60}}></th></tr></thead>
            <tbody>​              {etapesT.length===0&&<tr><td colSpan="4" className="empty">Aucune étape</td></tr>}
              {etapesT.map(e=>(
                <tr key={e.id}>
                  <td>{e.ordre||'-'}</td>
                  <td>{e.libelle}</td>
                  <td>{resultats.filter(r=>r.etape_id===e.id).length}</td>
                  <td><button className="dng" onClick={()=>delEtape(e.id)}>✕</button></td>
                </tr>
              ))}
            </tbody>
          </table>

          <h3>Résultats</h3>
          <div className="row">
            <select value={resForm.etape_id} onChange={e=>setResForm({...resForm,etape_id:e.target.value})}>
              <option value="">-- Étape --</option>
              {etapesT.map(e=><option key={e.id} value={e.id}>{e.ordre}. {e.libelle}</option>)}
            </select>
            <select value={resForm.statut} onChange={e=>setResForm({...resForm,statut:e.target.value})}>
              <option value="ok">OK</option>
              <option value="ko">KO</option>
              <option value="wait">En attente</option>
            </select>
          </div>
          <textarea placeholder="Commentaire" value={resForm.commentaire} onChange={e=>setResForm({...resForm,commentaire:e.target.value})} style={{marginTop:6}}/>
          <div style={{marginTop:6}}><button onClick={addRes}>+ Ajouter résultat</button></div>

          <table style={{marginTop:10}}>
            <thead><tr><th>Étape</th><th style={{width:90}}>Statut</th><th>Commentaire</th><th style={{width:60}}></th></tr></thead>
            <tbody>
              {resultats.filter(r=>etapesT.some(e=>e.id===r.etape_id)).length===0&&<tr><td colSpan="4" className="empty">Aucun résultat</td></tr>}
              {resultats.filter(r=>etapesT.some(e=>e.id===r.etape_id)).map(r=>{
                const et=etapes.find(e=>e.id===r.etape_id);
                return(<tr key={r.id}>
                  <td>{et?`${et.ordre||'-'}. ${et.libelle}`:'?'}</td>
                  <td><span className={'badge '+r.statut}>{r.statut}</span></td>
                  <td>{r.commentaire||'-'}</td>
                  <td><button className="dng" onClick={()=>delRes(r.id)}>✕</button></td>
                </tr>);
              })}
            </tbody>
          </table>
        </div>)}
      </div>
    </div>
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
