<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Gestion des clés</title>
<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,Segoe UI,sans-serif;background:#f4f6f8;color:#222;padding:16px}
h1{font-size:20px;margin-bottom:12px;color:#1a3a5c}
h2{font-size:15px;margin:14px 0 8px;color:#2a5a8c;border-bottom:2px solid #2a5a8c;padding-bottom:4px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:16px}
.card{background:#fff;border-radius:8px;padding:14px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{text-align:left;padding:6px 8px;border-bottom:1px solid #e5e9ee}
th{background:#f0f4f8;font-weight:600;color:#2a5a8c}
tr:hover{background:#fafbfc}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.b-ok{background:#d4f5dd;color:#15693a}
.b-ko{background:#fde0e0;color:#9a1b1b}
.b-n{background:#e2e8ed;color:#3a5068}
.tabs{display:flex;gap:4px;margin-bottom:12px;border-bottom:2px solid #dde3ea}
.tab{padding:8px 14px;cursor:pointer;border:none;background:none;font-size:13px;color:#556;border-bottom:2px solid transparent;margin-bottom:-2px}
.tab.act{color:#1a3a5c;border-bottom-color:#1a3a5c;font-weight:600}
.stat{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:12px}
.stat-c{background:#fff;padding:10px 14px;border-radius:6px;flex:1;min-width:120px;box-shadow:0 1px 2px rgba(0,0,0,.06)}
.stat-v{font-size:22px;font-weight:700;color:#1a3a5c}
.stat-l{font-size:11px;color:#667;text-transform:uppercase}
.empty{text-align:center;color:#889;padding:20px;font-style:italic;font-size:12px}
.search{width:100%;padding:6px 10px;border:1px solid #ccd;border-radius:4px;font-size:13px;margin-bottom:8px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect}=React;

const toRows=(t)=>{const ids=t.id||[];return ids.map((id,i)=>{const r={id};Object.keys(t).forEach(k=>{if(k!=='id')r[k]=t[k][i]});return r})};

const fmtDate=(v)=>{if(!v)return '-';const d=typeof v==='number'?new Date(v*1000):new Date(v);return isNaN(d)?'-':d.toLocaleDateString('fr-FR')};

function App(){
  const [tab,setTab]=useState('cles');
  const [utilisateurs,setUtilisateurs]=useState([]);
  const [cles,setCles]=useState([]);
  const [emprunts,setEmprunts]=useState([]);
  const [statuts,setStatuts]=useState([]);
  const [err,setErr]=useState(null);
  const [q,setQ]=useState('');

  const load=async()=>{
    const tryFetch=async(n)=>{try{return toRows(await grist.docApi.fetchTable(n))}catch(e){return null}};
    const u=await tryFetch('Utilisateur')||await tryFetch('Utilisateurs')||[];
    const c=await tryFetch('Cle')||await tryFetch('Cles')||[];
    const e=await tryFetch('Emprunt')||await tryFetch('Emprunts')||[];
    const s=await tryFetch('Statut')||await tryFetch('Statuts')||[];
    setUtilisateurs(u);setCles(c);setEmprunts(e);setStatuts(s);
  };

  useEffect(()=>{
    grist.ready({requiredAccess:'full'});
    grist.onRecords(async()=>{try{await load()}catch(e){setErr(e.message)}});
  },[]);

  const getLabel=(list,id,fields=['nom','libelle','name','titre','label'])=>{
    const r=list.find(x=>x.id===id);
    if(!r)return id?`#${id}`:'-';
    for(const f of fields)if(r[f])return r[f];
    return `#${id}`;
  };

  const enCours=emprunts.filter(e=>!e.date_retour&&!e.retour);
  const dispo=cles.length-enCours.length;

  const filter=(arr,fn)=>{if(!q)return arr;const s=q.toLowerCase();return arr.filter(fn(s))};

  const fCles=filter(cles,s=>c=>(c.nom||c.libelle||c.code||'').toString().toLowerCase().includes(s));
  const fEmp=filter(emprunts,s=>e=>JSON.stringify(e).toLowerCase().includes(s));
  const fUsr=filter(utilisateurs,s=>u=>(u.nom||u.name||u.email||'').toString().toLowerCase().includes(s));

  return (
    <div>
      <h1>🔑 Gestion des clés</h1>
      {err&&<div className="card" style={{background:'#fde0e0',color:'#9a1b1b',marginBottom:12}}>Erreur: {err}</div>}

      <div className="stat">
        <div className="stat-c"><div className="stat-v">{cles.length}</div><div className="stat-l">Clés totales</div></div>
        <div className="stat-c"><div className="stat-v">{dispo}</div><div className="stat-l">Disponibles</div></div>
        <div className="stat-c"><div className="stat-v">{enCours.length}</div><div className="stat-l">Empruntées</div></div>
        <div className="stat-c"><div className="stat-v">{utilisateurs.length}</div><div className="stat-l">Utilisateurs</div></div>
      </div>

      <div className="tabs">
        <button className={'tab'+(tab==='cles'?' act':'')} onClick={()=>setTab('cles')}>Clés ({cles.length})</button>
        <button className={'tab'+(tab==='emprunts'?' act':'')} onClick={()=>setTab('emprunts')}>Emprunts ({emprunts.length})</button>
        <button className={'tab'+(tab==='utilisateurs'?' act':'')} onClick={()=>setTab('utilisateurs')}>Utilisateurs ({utilisateurs.length})</button>
        <button className={'tab'+(tab==='statuts'?' act':'')} onClick={()=>setTab('statuts')}>Statuts ({statuts.length})</button>
      </div>

      <input className="search" placeholder="Rechercher..." value={q} onChange={e=>setQ(e.target.value)}/>

      {tab==='cles'&&(
        <div className="card">
          <h2>Liste des clés</h2>
          {fCles.length===0?<div className="empty">Aucune clé</div>:(
            <table><thead><tr><th>ID</th><th>Nom / Code</th><th>Description</th><th>Statut</th></tr></thead>
            <tbody>{fCles.map(c=>{
              const empr=enCours.find(e=>e.cle===c.id||e.cle_id===c.id||e.Cle===c.id);
              return(<tr key={c.id}>
                <td>#{c.id}</td>
                <td><b>{c.nom||c.libelle||c.code||`Clé #${c.id}`}</b></td>
                <td>{c.description||c.lieu||c.emplacement||'-'}</td>
                <td>{empr?<span className="badge b-ko">Empruntée</span>:<span className="badge b-ok">Disponible</span>}</td>
              </tr>);
            })}</tbody></table>
          )}
        </div>
      )}

      {tab==='emprunts'&&(
        <div className="card">
          <h2>Historique des emprunts</h2>
          {fEmp.length===0?<div className="empty">Aucun emprunt</div>:(
            <table><thead><tr><th>ID</th><th>Clé</th><th>Utilisateur</th><th>Emprunt</th><th>Retour</th><th>État</th></tr></thead>
            <tbody>{fEmp.map(e=>{
              const cleId=e.cle||e.cle_id||e.Cle;
              const usrId=e.utilisateur||e.utilisateur_id||e.Utilisateur||e.user;
              const dE=e.date_emprunt||e.date_debut||e.emprunt;
              const dR=e.date_retour||e.retour;
              return(<tr key={e.id}>
                <td>#{e.id}</td>
                <td>{e.gristHelper_Display||getLabel(cles,cleId,['nom','libelle','code'])}</td>
                <td>{e.gristHelper_Display2||getLabel(utilisateurs,usrId,['nom','name','email'])}</td>
                <td>{fmtDate(dE)}</td>
                <td>{fmtDate(dR)}</td>
                <td>{dR?<span className="badge b-n">Retournée</span>:<span className="badge b-ko">En cours</span>}</td>
              </tr>);
            })}</tbody></table>
          )}
        </div>
      )}

      {tab==='utilisateurs'&&(
        <div className="card">
          <h2>Utilisateurs</h2>
          {fUsr.length===0?<div className="empty">Aucun utilisateur</div>:(
            <table><thead><tr><th>ID</th><th>Nom</th><th>Email</th><th>Emprunts actifs</th></tr></thead>
            <tbody>{fUsr.map(u=>{
              const n=enCours.filter(e=>(e.utilisateur||e.utilisateur_id||e.Utilisateur)===u.id).length;
              return(<tr key={u.id}>
                <td>#{u.id}</td>
                <td><b>{u.nom||u.name||u.prenom||`User #${u.id}`}</b></td>
                <td>{u.email||'-'}</td>
                <td>{n>0?<span className="badge b-ko">{n}</span>:<span className="badge b-ok">0</span>}</td>
              </tr>);
            })}</tbody></table>
          )}
        </div>
      )}

      {tab==='statuts'&&(
        <div className="card">
          <h2>Statuts</h2>
          {statuts.length===0?<div className="empty">Aucun statut</div>:(
            <table><thead><tr><th>ID</th><th>Libellé</th><th>Description</th></tr></thead>
            <tbody>{statuts.map(s=>(
              <tr key={s.id}>
                <td>#{s.id}</td>
                <td><b>{s.nom||s.libelle||s.label||`#${s.id}`}</b></td>
                <td>{s.description||'-'}</td>
              </tr>
            ))}</tbody></table>
          )}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
