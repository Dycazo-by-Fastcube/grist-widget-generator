<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Liste Matériel</title>
<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:system-ui,sans-serif;background:#f5f6fa;color:#222;font-size:14px}
.app{padding:16px;max-width:1400px;margin:0 auto}
.tabs{display:flex;gap:4px;border-bottom:2px solid #ddd;margin-bottom:16px}
.tab{padding:10px 18px;cursor:pointer;border:none;background:none;font-size:14px;font-weight:500;color:#555;border-bottom:3px solid transparent;margin-bottom:-2px}
.tab.active{color:#2563eb;border-bottom-color:#2563eb}
.bar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.bar input,.bar select{padding:8px 10px;border:1px solid #ccc;border-radius:6px;font-size:13px}
.bar input[type=search]{flex:1;min-width:180px}
button{padding:8px 14px;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500}
.btn-primary{background:#2563eb;color:#fff}
.btn-primary:hover{background:#1d4ed8}
.btn-danger{background:#dc2626;color:#fff}
.btn-ghost{background:#e5e7eb;color:#333}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.08)}
th,td{padding:10px 12px;text-align:left;border-bottom:1px solid #eee}
th{background:#f9fafb;font-weight:600;font-size:12px;text-transform:uppercase;color:#666}
tr:hover{background:#fafbfc}
.actions{display:flex;gap:6px}
.actions button{padding:4px 8px;font-size:12px}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:#fff;border-radius:10px;padding:20px;width:90%;max-width:500px;max-height:90vh;overflow:auto}
.modal h3{margin:0 0 16px}
.field{margin-bottom:12px}
.field label{display:block;margin-bottom:4px;font-weight:500;font-size:12px;color:#555}
.field input,.field select,.field textarea{width:100%;padding:8px 10px;border:1px solid #ccc;border-radius:6px;font-size:13px}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:16px}
.badge{display:inline-block;padding:2px 8px;border-radius:12px;background:#e0e7ff;color:#3730a3;font-size:11px;font-weight:500}
.toast{position:fixed;top:16px;right:16px;padding:10px 16px;border-radius:6px;color:#fff;z-index:200;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.toast.ok{background:#16a34a}.toast.err{background:#dc2626}
.empty{padding:32px;text-align:center;color:#888}
.sub-tabs{display:flex;gap:4px;margin-bottom:12px}
.sub-tab{padding:6px 12px;border:1px solid #ddd;background:#fff;border-radius:6px;cursor:pointer;font-size:12px}
.sub-tab.active{background:#2563eb;color:#fff;border-color:#2563eb}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef}=React;
const toRows=(t)=>{const ids=t.id||[];return ids.map((id,i)=>{const r={id};Object.keys(t).forEach(k=>{if(k!=='id')r[k]=t[k][i]});return r})};

function App(){
const [tab,setTab]=useState('liste');
const [subTab,setSubTab]=useState('Materiel');
const [materiel,setMateriel]=useState([]);
const [categorie,setCategorie]=useState([]);
const [fournisseur,setFournisseur]=useState([]);
const [statut,setStatut]=useState([]);
const [search,setSearch]=useState('');
const [fCat,setFCat]=useState('');
const [fStat,setFStat]=useState('');
const [modal,setModal]=useState(null);
const [form,setForm]=useState({});
const [toast,setToast]=useState(null);
const toastTimer=useRef();

const showToast=(type,msg)=>{setToast({type,msg});if(toastTimer.current)clearTimeout(toastTimer.current);toastTimer.current=setTimeout(()=>setToast(null),3000)};

const load=async()=>{
try{
setMateriel(toRows(await grist.docApi.fetchTable('Materiel')));
setCategorie(toRows(await grist.docApi.fetchTable('Categorie')));
setFournisseur(toRows(await grist.docApi.fetchTable('Fournisseur')));
setStatut(toRows(await grist.docApi.fetchTable('Statut')));
}catch(e){showToast('err','Erreur chargement: '+e.message)}
};

useEffect(()=>{
grist.ready({requiredAccess:'full'});
grist.onRecords(()=>load());
load();
},[]);

const tableOf=(n)=>({Materiel:materiel,Categorie:categorie,Fournisseur:fournisseur,Statut:statut}[n]);

const openCreate=(tbl)=>{setForm({});setModal({mode:'create',table:tbl})};
const openEdit=(tbl,row)=>{setForm({...row});setModal({mode:'edit',table:tbl})};

const save=async()=>{
try{
const {mode,table}=modal;
const data={...form};delete data.id;
Object.keys(data).forEach(k=>{if(k.startsWith('gristHelper_')||k==='manualSort')delete data[k]});
if(mode==='create'){
await grist.docApi.applyUserActions([['AddRecord',table,null,data]]);
showToast('ok','Créé');
}else{
await grist.docApi.applyUserActions([['UpdateRecord',table,form.id,data]]);
showToast('ok','Modifié');
}
setModal(null);await load();
}catch(e){showToast('err',e.message)}
};

const remove=async(tbl,id)=>{
if(!confirm('Supprimer cet élément ?'))return;
try{
await grist.docApi.applyUserActions([['RemoveRecord',tbl,id]]);
showToast('ok','Supprimé');await load();
}catch(e){showToast('err',e.message)}
};

const nameOf=(list,id)=>{const r=list.find(x=>x.id===id);return r?(r.nom||r.libelle||r.name||('#'+id)):''};

const filteredMat=materiel.filter(m=>{
const s=search.toLowerCase();
const matchS=!s||Object.values(m).some(v=>String(v||'').toLowerCase().includes(s));
const matchC=!fCat||String(m.categorie)===fCat||String(m.categorie_id)===fCat;
const matchSt=!fStat||String(m.statut)===fStat||String(m.statut_id)===fStat;
return matchS&&matchC&&matchSt;
});

const renderListe=()=>(
<div>
<div className="sub-tabs">
{['Materiel','Categorie','Fournisseur','Statut'].map(t=>(
<button key={t} className={'sub-tab '+(subTab===t?'active':'')} onClick={()=>setSubTab(t)}>{t}</button>
))}
</div>
{subTab==='Materiel'?renderMateriel():renderSimple(subTab)}
</div>
);

const renderMateriel=()=>(
<div>
<div className="bar">
<input type="search" placeholder="Rechercher…" value={search} onChange={e=>setSearch(e.target.value)}/>
<select value={fCat} onChange={e=>setFCat(e.target.value)}>
<option value="">Toutes catégories</option>
{categorie.map(c=><option key={c.id} value={c.id}>{c.nom||c.libelle||('#'+c.id)}</option>)}
</select>
<select value={fStat} onChange={e=>setFStat(e.target.value)}>
<option value="">Tous statuts</option>
{statut.map(s=><option key={s.id} value={s.id}>{s.nom||s.libelle||('#'+s.id)}</option>)}
</select>
<button className="btn-primary" onClick={()=>openCreate('Materiel')}>+ Ajouter</button>
</div>
{filteredMat.length===0?<div className="empty">Aucun matériel</div>:
<table><thead><tr>
<th>ID</th><th>Nom</th><th>Catégorie</th><th>Fournisseur</th><th>Statut</th><th></th>
</tr></thead><tbody>
{filteredMat.map(m=>(
<tr key={m.id}>
<td>#{m.id}</td>
<td>{m.nom||m.libelle||m.designation||''}</td>
<td><span className="badge">{nameOf(categorie,m.categorie||m.categorie_id)}</span></td>
<td>{nameOf(fournisseur,m.fournisseur||m.fournisseur_id)}</td>
<td><span className="badge">{nameOf(statut,m.statut||m.statut_id)}</span></td>
<td className="actions">
<button className="btn-ghost" onClick={()=>openEdit('Materiel',m)}>✎</button>
<button className="btn-danger" onClick={()=>remove('Materiel',m.id)}>✕</button>
</td>
</tr>
))}
</tbody></table>}
</div>
);

const renderSimple=(tbl)=>{
const data=tableOf(tbl);
const cols=data[0]?Object.keys(data[0]).filter(k=>k!=='id'&&!k.startsWith('gristHelper_')&&k!=='manualSort'):['nom'];
return(<div>
<div className="bar">
<button className="btn-primary" onClick={()=>openCreate(tbl)}>+ Ajouter</button>
</div>
{data.length===0?<div className="empty">Aucune donnée</div>:
<table><thead><tr>
<th>ID</th>{cols.map(c=><th key={c}>{c}</th>)}<th></th>
</tr></thead><tbody>
{data.map(r=>(
<tr key={r.id}>
<td>#{r.id}</td>
{cols.map(c=><td key={c}>{String(r[c]||'')}</td>)}
<td className="actions">
<button className="btn-ghost" onClick={()=>openEdit(tbl,r)}>✎</button>
<button className="btn-danger" onClick={()=>remove(tbl,r.id)}>✕</button>
</td>
</tr>
))}
</tbody></table>}
</div>);
};

const renderHistorique=()=>{
const sorted=[...materiel].sort((a,b)=>(b.id||0)-(a.id||0));
return(<div>
<h3 style={{marginTop:0}}>Historique matériel</h3>
{sorted.length===0?<div className="empty">Aucun historique</div>:
<table><thead><tr>
<th>ID</th><th>Nom</th><th>Catégorie</th><th>Statut</th><th>Fournisseur</th>
</tr></thead><tbody>
{sorted.map(m=>(
<tr key={m.id}>
<td>#{m.id}</td>
<td>{m.nom||m.libelle||m.designation||''}</td>
<td><span className="badge">{nameOf(categorie,m.categorie||m.categorie_id)}</span></td>
<td><span className="badge">{nameOf(statut,m.statut||m.statut_id)}</span></td>
<td>{nameOf(fournisseur,m.fournisseur||m.fournisseur_id)}</td>
</tr>
))}
</tbody></table>}
</div>);
};

const renderModal=()=>{
if(!modal)return null;
const {table}=modal;
const sample=tableOf(table)[0]||{};
const cols=Object.keys(sample).filter(k=>k!=='id'&&!k.startsWith('gristHelper_')&&k!=='manualSort');
const fields=cols.length>0?cols:(table==='Materiel'?['nom','categorie','fournisseur','statut']:['nom']);
const refMap={categorie:categorie,categorie_id:categorie,fournisseur:fournisseur,fournisseur_id:fournisseur,statut:statut,statut_id:statut};
return(
<div className="modal-bg" onClick={e=>{if(e.target===e.currentTarget)setModal(null)}}>
<div className="modal">
<h3>{modal.mode==='create'?'Créer':'Modifier'} — {table}</h3>
{fields.map(f=>(
<div className="field" key={f}>
<label>{f}</label>
{refMap[f]?
<select value={form[f]||''} onChange={e=>setForm({...form,[f]:e.target.value?parseInt(e.target.value):null})}>
<option value="">—</option>
{refMap[f].map(r=><option key={r.id} value={r.id}>{r.nom||r.libelle||('#'+r.id)}</option>)}
</select>
:<input value={form[f]||''} onChange={e=>setForm({...form,[f]:e.target.value})}/>
}
</div>
))}
<div className="modal-actions">
<button className="btn-ghost" onClick={()=>setModal(null)}>Annuler</button>
<button className="btn-primary" onClick={save}>Enregistrer</button>
</div>
</div>
</div>
);
};

return(
<div className="app">
<div className="tabs">
<button className={'tab '+(tab==='liste'?'active':'')} onClick={()=>setTab('liste')}>Liste</button>
<button className={'tab '+(tab==='histo'?'active':'')} onClick={()=>setTab('histo')}>Historique</button>
</div>
{tab==='liste'?renderListe():renderHistorique()}
{renderModal()}
{toast&&<div className={'toast '+toast.type}>{toast.msg}</div>}
</div>
);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
