<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Annuaire des Ressources</title>
<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f5f7fa;color:#222;padding:16px}
h1{font-size:20px;margin-bottom:12px;color:#1a4480}
.toolbar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.toolbar input,.toolbar select{padding:6px 10px;border:1px solid #ccd;border-radius:4px;font-size:14px}
.toolbar input[type=search]{flex:1;min-width:180px}
button{padding:6px 12px;border:none;border-radius:4px;cursor:pointer;font-size:14px;background:#1a4480;color:#fff}
button:hover{background:#2a5490}
button.sec{background:#e0e4eb;color:#222}
button.sec:hover{background:#d0d4db}
button.danger{background:#c0392b}
button.danger:hover{background:#a93224}
button.sm{padding:4px 8px;font-size:12px}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:6px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.08)}
th,td{padding:8px 12px;text-align:left;border-bottom:1px solid #eef}
th{background:#f0f3f8;font-weight:600;font-size:13px;color:#555}
tr:hover{background:#fafbfd}
.actions{display:flex;gap:6px}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:#fff;border-radius:8px;padding:20px;width:90%;max-width:480px;max-height:90vh;overflow:auto}
.modal h2{margin-bottom:14px;font-size:17px}
.field{margin-bottom:12px}
.field label{display:block;font-size:13px;font-weight:500;margin-bottom:4px;color:#444}
.field input,.field select,.field textarea{width:100%;padding:7px 10px;border:1px solid #ccd;border-radius:4px;font-size:14px;font-family:inherit}
.field textarea{resize:vertical;min-height:60px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.toast{position:fixed;bottom:20px;right:20px;padding:10px 16px;border-radius:6px;color:#fff;font-size:14px;z-index:200;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.toast.ok{background:#27ae60}
.toast.err{background:#c0392b}
.empty{text-align:center;padding:30px;color:#888}
.tabs{display:flex;gap:4px;margin-bottom:12px;border-bottom:2px solid #dde}
.tab{padding:8px 16px;cursor:pointer;border-radius:4px 4px 0 0;font-size:14px;background:none;color:#555}
.tab.active{background:#1a4480;color:#fff}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:12px;background:#e0e4eb}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback}=React;

const toRows=(t)=>{const ids=t.id||[];return ids.map((id,i)=>{const r={id};Object.keys(t).forEach(k=>{if(k!=='id')r[k]=t[k][i]});return r})};

function App(){
  const [tab,setTab]=useState('Ressource');
  const [ressources,setRessources]=useState([]);
  const [categories,setCategories]=useState([]);
  const [statuts,setStatuts]=useState([]);
  const [localisations,setLocalisations]=useState([]);
  const [search,setSearch]=useState('');
  const [filterCat,setFilterCat]=useState('');
  const [filterStat,setFilterStat]=useState('');
  const [filterLoc,setFilterLoc]=useState('');
  const [editing,setEditing]=useState(null);
  const [toast,setToast]=useState(null);
  const toastTimer=useRef(null);
  const [loading,setLoading]=useState(true);

  const showToast=(type,msg)=>{setToast({type,msg});if(toastTimer.current)clearTimeout(toastTimer.current);toastTimer.current=setTimeout(()=>setToast(null),3000)};

  const loadAll=useCallback(async()=>{
    try{
      const [r,c,s,l]=await Promise.all([
        grist.docApi.fetchTable('Ressource').catch(()=>({id:[]})),
        grist.docApi.fetchTable('Categorie').catch(()=>({id:[]})),
        grist.docApi.fetchTable('Statut').catch(()=>({id:[]})),
        grist.docApi.fetchTable('Localisation').catch(()=>({id:[]}))
      ]);
      setRessources(toRows(r));
      setCategories(toRows(c));
      setStatuts(toRows(s));
      setLocalisations(toRows(l));
      setLoading(false);
    }catch(e){showToast('err','Erreur chargement: '+e.message);setLoading(false)}
  },[]);

  useEffect(()=>{
    grist.ready({requiredAccess:'full'});
    grist.onRecords(()=>loadAll());
    loadAll();
  },[loadAll]);

  const nameOf=(list,id)=>{const it=list.find(x=>x.id===id);return it?(it.nom||it.name||it.libelle||`#${id}`):''};

  const saveRecord=async(table,id,data)=>{
    try{
      if(id){await grist.docApi.applyUserActions([['UpdateRecord',table,id,data]])}
      else{await grist.docApi.applyUserActions([['AddRecord',table,null,data]])}
      await loadAll();
      setEditing(null);
      showToast('ok','Enregistré');
    }catch(e){showToast('err','Erreur: '+e.message)}
  };

  const deleteRecord=async(table,id)=>{
    if(!confirm('Supprimer cet élément ?'))return;
    try{
      await grist.docApi.applyUserActions([['RemoveRecord',table,id]]);
      await loadAll();
      showToast('ok','Supprimé');
    }catch(e){showToast('err','Erreur: '+e.message)}
  };

  const filteredRes=ressources.filter(r=>{
    const q=search.toLowerCase();
    if(q){
      const hay=[r.nom,r.description,r.reference].filter(Boolean).join(' ').toLowerCase();
      if(!hay.includes(q))return false;
    }
    if(filterCat&&r.categorie!=+filterCat)return false;
    if(filterStat&&r.statut!=+filterStat)return false;
    if(filterLoc&&r.localisation!=+filterLoc)return false;
    return true;
  });

  if(loading)return <div className="empty">Chargement...</div>;

  return(<div>
    <h1>📋 Annuaire des Ressources</h1>
    <div className="tabs">
      <button className={'tab '+(tab==='Ressource'?'active':'')} onClick={()=>setTab('Ressource')}>Ressources</button>
      <button className={'tab '+(tab==='Categorie'?'active':'')} onClick={()=>setTab('Categorie')}>Catégories</button>
      <button className={'tab '+(tab==='Statut'?'active':'')} onClick={()=>setTab('Statut')}>Statuts</button>
    </div>

    {tab==='Ressource'&&(<>
      <div className="toolbar">
        <input type="search" placeholder="🔍 Rechercher..." value={search} onChange={e=>setSearch(e.target.value)}/>
        <select value={filterCat} onChange={e=>setFilterCat(e.target.value)}>
          <option value="">Toutes catégories</option>
          {categories.map(c=><option key={c.id} value={c.id}>{c.nom||c.name||c.libelle||`#${c.id}`}</option>)}
        </select>
        <select value={filterStat} onChange={e=>setFilterStat(e.target.value)}>
          <option value="">Tous statuts</option>
          {statuts.map(s=><option key={s.id} value={s.id}>{s.nom||s.name||s.libelle||`#${s.id}`}</option>)}
        </select>
        <select value={filterLoc} onChange={e=>setFilterLoc(e.target.value)}>
          <option value="">Toutes localisations</option>
          {localisations.map(l=><option key={l.id} value={l.id}>{l.nom||l.name||l.libelle||`#${l.id}`}</option>)}
        </select>
        <button onClick={()=>setEditing({table:'Ressource',data:{}})}>+ Nouvelle ressource</button>
      </div>
      {filteredRes.length===0?<div className="empty">Aucune ressource</div>:(
        <table><thead><tr>
          <th>Nom</th><th>Référence</th><th>Catégorie</th><th>Statut</th><th>Localisation</th><th></th>
        </tr></thead><tbody>
          {filteredRes.map(r=><tr key={r.id}>
            <td><strong>{r.nom||'-'}</strong></td>
            <td>{r.reference||'-'}</td>
            <td><span className="badge">{nameOf(categories,r.categorie)||'-'}</span></td>
            <td><span className="badge">{nameOf(statuts,r.statut)||'-'}</span></td>
            <td>{nameOf(localisations,r.localisation)||'-'}</td>
            <td className="actions">
              <button className="sec sm" onClick={()=>setEditing({table:'Ressource',data:r})}>✏️</button>
              <button className="danger sm" onClick={()=>deleteRecord('Ressource',r.id)}>🗑</button>
            </td>
          </tr>)}
        </tbody></table>
      )}
    </>)}

    {tab==='Categorie'&&<SimpleList title="Catégorie" items={categories} table="Categorie" onEdit={setEditing} onDel={deleteRecord}/>}
    {tab==='Statut'&&<SimpleList title="Statut" items={statuts} table="Statut" onEdit={setEditing} onDel={deleteRecord}/>}

    {editing&&<EditModal ctx={editing} categories={categories} statuts={statuts} localisations={localisations} onClose={()=>setEditing(null)} onSave={saveRecord}/>}
    {toast&&<div className={'toast '+toast.type}>{toast.msg}</div>}
  </div>);
}

function SimpleList({title,items,table,onEdit,onDel}){
  return(<>
    <div className="toolbar">
      <button onClick={()=>onEdit({table,data:{}})}>+ Nouvelle {title.toLowerCase()}</button>
    </div>
    {items.length===0?<div className="empty">Aucun élément</div>:(
      <table><thead><tr><th>Nom</th><th>Description</th><th></th></tr></thead><tbody>
        {items.map(it=><tr key={it.id}>
          <td><strong>{it.nom||it.name||it.libelle||'-'}</strong></td>
          <td>{it.description||'-'}</td>
          <td className="actions">
            <button className="sec sm" onClick={()=>onEdit({table,data:it})}>✏️</button>
            <button className="danger sm" onClick={()=>onDel(table,it.id)}>🗑</button>
          </td>
        </tr>)}
      </tbody></table>
    )}
  </>);
}

function EditModal({ctx,categories,statuts,localisations,onClose,onSave}){
  const [form,setForm]=useState({...ctx.data});
  const isRes=ctx.table==='Ressource';
  const upd=(k,v)=>setForm(f=>({...f,[k]:v}));

  const submit=(e)=>{
    e.preventDefault();
    const data={};
    if(isRes){
      data.nom=form.nom||'';
      data.reference=form.reference||'';
      data.description=form.description||'';
      if(form.categorie)data.categorie=+form.categorie;
      if(form.statut)data.statut=+form.statut;
      if(form.localisation)data.localisation=+form.localisation;
    }else{
      data.nom=form.nom||form.name||form.libelle||'';
      data.description=form.description||'';
    }
    onSave(ctx.table,ctx.data.id,data);
  };

  return(<div className="modal-bg" onClick={onClose}>
    <div className="modal" onClick={e=>e.stopPropagation()}>
      <h2>{ctx.data.id?'Modifier':'Créer'} — {ctx.table}</h2>
      <form onSubmit={submit}>
        <div className="field">
          <label>Nom *</label>
          <input required value={form.nom||form.name||form.libelle||''} onChange={e=>upd('nom',e.target.value)}/>
        </div>
        {isRes&&<div className="field">
          <label>Référence</label>
          <input value={form.reference||''} onChange={e=>upd('reference',e.target.value)}/>
        </div>}
        <div className="field">
          <label>Description</label>
          <textarea value={form.description||''} onChange={e=>upd('description',e.target.value)}/>
        </div>
        {isRes&&<>
          <div className="field">
            <label>Catégorie</label>
            <select value={form.categorie||''} onChange={e=>upd('categorie',e.target.value)}>
              <option value="">-- Aucune --</option>
              {categories.map(c=><option key={c.id} value={c.id}>{c.nom||c.name||c.libelle||`#${c.id}`}</option>)}
            </select>
          </div>
          <div className="field">
            <label>Statut</label>
            <select value={form.statut||''} onChange={e=>upd('statut',e.target.value)}>
              <option value="">-- Aucun --</option>
              {statuts.map(s=><option key={s.id} value={s.id}>{s.nom||s.name||s.libelle||`#${s.id}`}</option>)}
            </select>
          </div>
          <div className="field">
            <label>Localisation</label>
            <select value={form.localisation||''} onChange={e=>upd('localisation',e.target.value)}>
              <option value="">-- Aucune --</option>
              {localisations.map(l=><option key={l.id} value={l.id}>{l.nom||l.name||l.libelle||`#${l.id}`}</option>)}
            </select>
          </div>
        </>}
        <div className="modal-actions">
          <button type="button" className="sec" onClick={onClose}>Annuler</button>
          <button type="submit">Enregistrer</button>
        </div>
      </form>
    </div>
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
